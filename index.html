<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>كلمة - لعبة الكلمات العربية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(145deg, #0a0a0f 0%, #1a1a2e 50%, #0f1729 100%);
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Tajawal', 'Noto Kufi Arabic', sans-serif;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: clamp(10px, 2.5vw, 20px);
      padding-bottom: clamp(12px, 3vw, 24px);
    }

    body::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 80% 20%, rgba(217, 119, 6, 0.12) 0%, transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
      pointer-events: none; z-index: 0;
    }

    .game-container {
      width: 100%;
      max-width: min(500px, 100vw);
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 1;
    }

    /* ── Header ── */
    .header { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: clamp(8px, 2vw, 16px); }

    .title {
      font-family: 'Noto Kufi Arabic', serif;
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 800; letter-spacing: 0.05em;
      background: linear-gradient(135deg, #fff 0%, #fcd34d 50%, #f59e0b 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .subtitle { font-size: clamp(0.75rem, 2.5vw, 0.9rem); color: rgba(255,255,255,0.5); letter-spacing: 0.08em; }

    .timer { margin-top: 4px; font-size: clamp(0.75rem, 2.2vw, 0.85rem); color: rgba(255,255,255,0.6); direction: ltr; }
    .timer-label { color: rgba(255,255,255,0.4); margin-left: 6px; }

    /* ── Message ── */
    .message-container { height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: clamp(8px, 2vw, 14px); }
    .message {
      background: rgba(255,255,255,0.95); color: #1a1a2e; padding: 8px 24px;
      border-radius: 10px; font-weight: 700; font-size: clamp(0.85rem, 3vw, 1rem);
      animation: slideDown 0.25s ease-out; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .message.hidden { display: none; }
    @keyframes slideDown { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Board ── */
    .board { display: flex; flex-direction: column; gap: clamp(6px, 1.5vw, 10px); margin-bottom: clamp(16px, 4vw, 28px); }
    .row { display: flex; gap: clamp(6px, 1.5vw, 10px); direction: rtl; }
    .row.shake { animation: shake 0.5s ease-in-out; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

    /* Tile size: fluid between 52px (small phone) and 64px (tablet) */
    .tile {
      width: clamp(52px, 13vw, 64px);
      height: clamp(52px, 13vw, 64px);
      perspective: 1000px;
    }
    .tile-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s ease; }
    .tile-inner.flip { transform: rotateX(180deg); }
    .tile-inner.pop { animation: pop 0.1s ease; }
    @keyframes pop { 50% { transform: scale(1.08); } }

    .tile-front, .tile-back {
      position: absolute; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Kufi Arabic', serif;
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      font-weight: 700; border-radius: 10px; backface-visibility: hidden;
    }
    .tile-front { background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.12); color: #fff; }
    .tile-front.filled { border-color: rgba(255,255,255,0.5); }
    .tile-back { transform: rotateX(180deg); border: none; }
    .tile-back.correct { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); box-shadow: 0 4px 20px rgba(34,197,94,0.5); }
    .tile-back.present { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 4px 20px rgba(245,158,11,0.5); }
    .tile-back.absent { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); }

    /* ── Keyboard ── */
    .keyboard { display: flex; flex-direction: column; gap: clamp(5px, 1.5vw, 8px); width: 100%; }
    .keyboard-row { display: flex; justify-content: center; gap: clamp(3px, 1vw, 5px); direction: rtl; width: 100%; }

    .key {
      position: relative;
      height: clamp(52px, 13vw, 62px);
      min-width: 0;
      flex: 1 1 0;
      padding: 0;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Kufi Arabic', serif;
      font-size: clamp(1rem, 3.2vw, 1.25rem);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      background: rgba(255,255,255,0.13);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      user-select: none;
      -webkit-user-select: none;
    }

    .key.wide {
      flex: 1.8 1 0;
      font-size: clamp(0.7rem, 2.2vw, 0.85rem);
    }

    .key:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }
    .key.correct { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); box-shadow: 0 2px 10px rgba(34,197,94,0.4); }
    .key.present { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 2px 10px rgba(245,158,11,0.4); }
    .key.absent { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); }
    .key:disabled { cursor: not-allowed; opacity: 0.5; }

    /* Variant dots shown on cycle-able keys */
    .variant-dots { display: flex; gap: 3px; }
    .variant-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      transition: opacity 0.15s;
    }

    /* ── Game over ── */
    .game-over-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
    }
    .game-over-overlay.visible { display: flex; }
    .game-over-modal {
      position: relative;
      background: linear-gradient(145deg, #1a1a2e 0%, #0f1729 100%);
      padding: 36px; border-radius: 20px; text-align: center; max-width: 340px; width: 90%;
      border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .game-over-modal h2 { font-size: 1.8rem; margin-bottom: 14px; color: #fcd34d; }
    .game-over-modal p { color: rgba(255,255,255,0.7); margin-bottom: 10px; line-height: 1.6; }
    .game-over-modal .word-reveal { font-size: 2rem; font-weight: 800; color: #fff; margin: 18px 0; font-family: 'Noto Kufi Arabic', serif; }
    .game-over-modal .next-word-timer { font-size: 1.5rem; color: #f59e0b; direction: ltr; margin-top: 14px; }

    /* ── Stats / Instructions ── */
    .stats { margin-top: 14px; font-size: 0.9rem; color: rgba(255,255,255,0.4); }
    .instructions { margin-top: 20px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px; max-width: 400px; width: 100%; text-align: center; }
    .instructions h3 { font-size: 0.95rem; margin-bottom: 10px; color: rgba(255,255,255,0.8); }
    .instructions p { font-size: clamp(0.78rem, 2.5vw, 0.85rem); color: rgba(255,255,255,0.5); line-height: 1.9; }
    .color-hint { display: inline-block; width: 16px; height: 16px; border-radius: 3px; vertical-align: middle; margin: 0 3px; }
    .color-hint.green { background: #22c55e; }
    .color-hint.yellow { background: #f59e0b; }
    .color-hint.gray { background: rgba(255,255,255,0.15); }

    /* ── Loading ── */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 16px; color: rgba(255,255,255,0.5); font-size: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="game-container">
    <header class="header">
      <h1 class="title">كَلِمة</h1>
      <p class="subtitle">خمّن الكلمة في ٦ محاولات</p>
      <div class="timer">
        <span class="timer-label">كلمة جديدة في:</span>
        <span id="countdown">--:--:--</span>
      </div>
    </header>
    <div class="message-container">
      <div id="message" class="message hidden"></div>
    </div>
    <div id="game-area">
      <div class="loading">
        <div class="spinner"></div>
        <span>جاري التحميل...</span>
      </div>
    </div>
    <div id="stats" class="stats"></div>
    <div class="instructions">
      <h3>كيف تلعب؟</h3>
      <p>
        <span class="color-hint green"></span> أخضر: الحرف صحيح في مكانه<br>
        <span class="color-hint yellow"></span> أصفر: الحرف موجود في مكان آخر<br>
        <span class="color-hint gray"></span> رمادي: الحرف غير موجود<br><br>
        اضغط على ا و و ى مرة أخرى للحصول على المتغيرات<br>
        🕐 كلمة جديدة كل يوم!
      </p>
    </div>
  </div>

  <div id="gameOverOverlay" class="game-over-overlay">
    <div class="game-over-modal">
      <button onclick="document.getElementById('gameOverOverlay').classList.remove('visible')"
        style="position:absolute;top:12px;left:16px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.5rem;cursor:pointer;line-height:1;">✕</button>
      <h2 id="gameOverTitle">أحسنت!</h2>
      <p id="gameOverMessage">لقد فزت!</p>
      <div id="wordReveal" class="word-reveal"></div>
      <p>الكلمة القادمة في:</p>
      <div id="modalCountdown" class="next-word-timer">--:--:--</div>
    </div>
  </div>

  <script>
    /* ── Prevent all zoom (double-tap, pinch, gesture) ───────────────────── */
    document.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    /* Double-tap zoom: track last tap and block rapid second tap globally */
    let lastTap = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    /* ── Constants ───────────────────────────────────────────────────────── */
    const KEYBOARD_ROWS = [
      ['ج','ح','خ','ه','ع','غ','ف','ق','ث','ص','ض'],
      ['ة','ك','م','ن','ت','ا','ل','ب','ي','س','ش'],
      ['⌫','د','ذ','ط','ظ','ز','و','ى','ر','ء','إدخال']
    ];

    /* Tap-to-cycle variants: first entry is the base letter shown on key */
    const LETTER_VARIANTS = {
      'ا': ['ا','أ','إ','آ'],
      'و': ['و','ؤ'],
      'ى': ['ى','ئ'],
    };

    const STORAGE_KEY = 'kalima_game_state';
    let WORDS = [];
    let targetWord = '';
    let guesses = [];
    let currentGuess = '';
    let gameState = 'playing';
    let keyboardStatus = {};
    let todayKey = '';

    /* Variant cycle state */
    const variantIndex   = {};  /* current index per base key */
    const variantTimers  = {};  /* reset timers */

    const gameArea       = document.getElementById('game-area');
    const messageEl      = document.getElementById('message');
    const statsEl        = document.getElementById('stats');
    const countdownEl    = document.getElementById('countdown');
    const gameOverOverlay= document.getElementById('gameOverOverlay');
    const gameOverTitle  = document.getElementById('gameOverTitle');
    const gameOverMessage= document.getElementById('gameOverMessage');
    const wordReveal     = document.getElementById('wordReveal');
    const modalCountdown = document.getElementById('modalCountdown');

    let boardEl, keyboardEl;

    /* ── Word loading ────────────────────────────────────────────────────── */
    async function loadWords() {
      try {
        const response = await fetch('words.txt');
        if (!response.ok) throw new Error('Failed to load words.txt');
        const text = await response.text();
        WORDS = text.split('\n').map(w => w.trim()).filter(w => w.length === 5);
        if (WORDS.length === 0) throw new Error('No valid 5-letter words found in words.txt');
        init();
      } catch (err) {
        gameArea.innerHTML = `
          <div class="loading">
            <span style="color:#f87171;">⚠️ تعذّر تحميل قائمة الكلمات</span>
            <span style="font-size:0.8rem;color:rgba(255,255,255,0.3);">${err.message}</span>
          </div>`;
      }
    }

    /* ── Helpers ─────────────────────────────────────────────────────────── */
    function getTodayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }

    function getWordForDay(dateKey) {
      let hash = 0;
      for (let i = 0; i < dateKey.length; i++) {
        hash = ((hash << 5) - hash) + dateKey.charCodeAt(i);
        hash = hash & hash;
      }
      return WORDS[Math.abs(hash) % WORDS.length];
    }

    function getMsUntilMidnight() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      return midnight - now;
    }

    function formatTime(ms) {
      const t = Math.floor(ms / 1000);
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updateCountdown() {
      const formatted = formatTime(getMsUntilMidnight());
      countdownEl.textContent = formatted;
      modalCountdown.textContent = formatted;
      if (getTodayKey() !== todayKey) location.reload();
    }

    /* ── State ───────────────────────────────────────────────────────────── */
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ dateKey: todayKey, guesses, gameState, keyboardStatus }));
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return null;
        const state = JSON.parse(saved);
        if (state.dateKey !== todayKey) { localStorage.removeItem(STORAGE_KEY); return null; }
        return state;
      } catch(e) { return null; }
    }

    /* ── Init ────────────────────────────────────────────────────────────── */
    function init() {
      todayKey = getTodayKey();
      targetWord = getWordForDay(todayKey);

      const savedState = loadState();
      if (savedState) {
        guesses = savedState.guesses;
        gameState = savedState.gameState;
        keyboardStatus = savedState.keyboardStatus;
        currentGuess = '';
      } else {
        guesses = []; currentGuess = ''; gameState = 'playing'; keyboardStatus = {};
      }

      gameArea.innerHTML = `<div id="board" class="board"></div><div id="keyboard" class="keyboard"></div>`;
      boardEl   = document.getElementById('board');
      keyboardEl= document.getElementById('keyboard');

      renderBoard();
      renderKeyboard();
      if (savedState && guesses.length > 0) restorePreviousGuesses();
      updateStats();
      updateCountdown();
      setInterval(updateCountdown, 1000);
      if (gameState !== 'playing') setTimeout(() => showGameOverModal(), 500);
    }

    /* ── Board ───────────────────────────────────────────────────────────── */
    function renderBoard() {
      boardEl.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const row = document.createElement('div');
        row.className = 'row'; row.id = `row-${i}`;
        for (let j = 0; j < 5; j++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.innerHTML = `<div class="tile-inner" id="tile-${i}-${j}">
            <div class="tile-front" id="front-${i}-${j}"></div>
            <div class="tile-back"  id="back-${i}-${j}"></div>
          </div>`;
          row.appendChild(tile);
        }
        boardEl.appendChild(row);
      }
    }

    function restorePreviousGuesses() {
      guesses.forEach((guess, rowIndex) => {
        for (let i = 0; i < 5; i++) {
          const tileInner = document.getElementById(`tile-${rowIndex}-${i}`);
          const front     = document.getElementById(`front-${rowIndex}-${i}`);
          const back      = document.getElementById(`back-${rowIndex}-${i}`);
          const letter    = guess[i];
          const status    = getLetterStatus(letter, i, guess);
          front.textContent = letter;
          back.textContent  = letter;
          back.className    = 'tile-back ' + status;
          tileInner.classList.add('flip');
        }
      });
      updateKeyboard();
    }

    /* ── Keyboard ────────────────────────────────────────────────────────── */
    function renderKeyboard() {
      keyboardEl.innerHTML = '';

      KEYBOARD_ROWS.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'keyboard-row';

        row.forEach(key => {
          const keyEl = document.createElement('button');
          keyEl.className = 'key' + (key.length > 1 ? ' wide' : '');
          if (keyboardStatus[key]) keyEl.className += ' ' + keyboardStatus[key];
          keyEl.dataset.key = key;

          const variants = LETTER_VARIANTS[key];

          if (variants) {
            /* Key with tap-cycle variants: show letter + dots */
            variantIndex[key] = variantIndex[key] || 0;

            const letterSpan = document.createElement('span');
            letterSpan.className = 'key-letter';
            letterSpan.textContent = variants[variantIndex[key]];

            const dotsEl = document.createElement('div');
            dotsEl.className = 'variant-dots';
            variants.forEach((_, i) => {
              const dot = document.createElement('div');
              dot.className = 'variant-dot';
              dot.style.opacity = i === (variantIndex[key] || 0) ? '1' : '0.3';
              dotsEl.appendChild(dot);
            });

            keyEl.appendChild(letterSpan);
            keyEl.appendChild(dotsEl);

            keyEl.addEventListener('click', (e) => {
              e.preventDefault();
              if (gameState !== 'playing') return;

              const idx    = variantIndex[key] || 0;
              const letter = variants[idx];

              /* Type the current variant */
              if (currentGuess.length < 5) {
                currentGuess += letter;
                updateCurrentRow();
              }

              /* Advance cycle */
              variantIndex[key] = (idx + 1) % variants.length;
              letterSpan.textContent = variants[variantIndex[key]];
              Array.from(dotsEl.children).forEach((dot, i) => {
                dot.style.opacity = i === variantIndex[key] ? '1' : '0.3';
              });

              /* Reset to base after 1.5 s of inactivity */
              clearTimeout(variantTimers[key]);
              variantTimers[key] = setTimeout(() => {
                variantIndex[key] = 0;
                letterSpan.textContent = variants[0];
                Array.from(dotsEl.children).forEach((dot, i) => {
                  dot.style.opacity = i === 0 ? '1' : '0.3';
                });
              }, 1500);
            });

          } else {
            /* Normal key */
            keyEl.textContent = key;
            keyEl.addEventListener('click', (e) => {
              e.preventDefault();
              handleKeyPress(key);
            });
          }

          if (gameState !== 'playing') keyEl.disabled = true;
          rowEl.appendChild(keyEl);
        });

        keyboardEl.appendChild(rowEl);
      });
    }

    function updateKeyboard() {
      document.querySelectorAll('.key').forEach(keyEl => {
        const key = keyEl.dataset.key;
        if (keyboardStatus[key]) {
          const base = 'key' + (key.length > 1 ? ' wide' : '');
          keyEl.className = base + ' ' + keyboardStatus[key];
        }
        if (gameState !== 'playing') keyEl.disabled = true;
      });
    }

    /* ── Game logic ──────────────────────────────────────────────────────── */
    function getLetterStatus(letter, index, word) {
      if (targetWord[index] === letter) return 'correct';
      if (targetWord.includes(letter)) {
        const targetCount  = targetWord.split('').filter(l => l === letter).length;
        const correctCount = word.split('').filter((l, i) => l === letter && targetWord[i] === letter).length;
        const beforeCount  = word.slice(0, index).split('').filter((l, i) => l === letter && targetWord[i] !== letter).length;
        if (beforeCount < targetCount - correctCount) return 'present';
      }
      return 'absent';
    }

    function updateCurrentRow() {
      const rowIndex = guesses.length;
      for (let i = 0; i < 5; i++) {
        const front     = document.getElementById(`front-${rowIndex}-${i}`);
        const tileInner = document.getElementById(`tile-${rowIndex}-${i}`);
        const letter    = currentGuess[i] || '';
        if (letter && front.textContent !== letter) {
          tileInner.classList.add('pop');
          setTimeout(() => tileInner.classList.remove('pop'), 100);
        }
        front.textContent = letter;
        front.className   = 'tile-front' + (letter ? ' filled' : '');
      }
    }

    function revealGuess(rowIndex, guess) {
      return new Promise(resolve => {
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const tileInner = document.getElementById(`tile-${rowIndex}-${i}`);
            const back      = document.getElementById(`back-${rowIndex}-${i}`);
            const letter    = guess[i];
            const status    = getLetterStatus(letter, i, guess);
            back.textContent = letter;
            back.className   = 'tile-back ' + status;
            tileInner.classList.add('flip');
            if (status === 'correct') keyboardStatus[letter] = 'correct';
            else if (status === 'present' && keyboardStatus[letter] !== 'correct') keyboardStatus[letter] = 'present';
            else if (!keyboardStatus[letter]) keyboardStatus[letter] = 'absent';
            if (i === 4) setTimeout(() => { updateKeyboard(); resolve(); }, 300);
          }, i * 300);
        }
      });
    }

    function showMessage(text, duration = 1500) {
      messageEl.textContent = text;
      messageEl.classList.remove('hidden');
      if (duration > 0) setTimeout(() => messageEl.classList.add('hidden'), duration);
    }

    function shakeRow(rowIndex) {
      const row = document.getElementById(`row-${rowIndex}`);
      row.classList.add('shake');
      setTimeout(() => row.classList.remove('shake'), 500);
    }

    function updateStats() {
      const arabicNums = ['٠','١','٢','٣','٤','٥','٦'];
      statsEl.textContent = `${arabicNums[guesses.length]}/٦ محاولات`;
    }

    function showGameOverModal() {
      if (gameState === 'won') {
        const messages = ['عبقري!','رائع!','ممتاز!','جيد جداً!','جيد!','أحسنت!'];
        gameOverTitle.textContent   = messages[Math.min(guesses.length - 1, 5)];
        gameOverMessage.textContent = `فزت في ${guesses.length} محاولات`;
      } else {
        gameOverTitle.textContent   = 'انتهت اللعبة';
        gameOverMessage.textContent = 'حظاً أوفر غداً!';
      }
      wordReveal.textContent = targetWord;
      gameOverOverlay.classList.add('visible');
    }

    async function submitGuess() {
      if (currentGuess.length !== 5) {
        shakeRow(guesses.length); showMessage('أدخل ٥ أحرف'); return;
      }
      if (!WORDS.includes(currentGuess)) {
        shakeRow(guesses.length); showMessage('الكلمة غير موجودة في القاموس'); return;
      }
      const rowIndex = guesses.length;
      guesses.push(currentGuess);
      await revealGuess(rowIndex, currentGuess);
      if (currentGuess === targetWord) {
        gameState = 'won'; saveState(); setTimeout(() => showGameOverModal(), 500);
      } else if (guesses.length >= 6) {
        gameState = 'lost'; saveState(); setTimeout(() => showGameOverModal(), 500);
      } else {
        saveState();
      }
      currentGuess = '';
      updateStats();
    }

    function handleKeyPress(key) {
      if (gameState !== 'playing') return;
      if (key === 'إدخال') submitGuess();
      else if (key === '⌫') { currentGuess = currentGuess.slice(0, -1); updateCurrentRow(); }
      else if (currentGuess.length < 5) { currentGuess += key; updateCurrentRow(); }
    }

    document.addEventListener('keydown', (e) => {
      if (gameState !== 'playing') return;
      if (e.key === 'Enter') handleKeyPress('إدخال');
      else if (e.key === 'Backspace') handleKeyPress('⌫');
      else if (/^[\u0600-\u06FF]$/.test(e.key)) handleKeyPress(e.key);
    });

    loadWords();
  </script>
</body>
</html>
